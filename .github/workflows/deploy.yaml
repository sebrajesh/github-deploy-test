name: Deploy Project
on: push 
jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code 
        uses: actions/checkout@v3 
      - name: Install nodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18.19.1
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint 
      - name: Testing
        run: npm run test 
      - name: Deploy
        run: echo "Deploying to env..."